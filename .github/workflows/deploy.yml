name: Deploy to Staging

# Disabled: server is on Tailscale (100.x.x.x), not reachable from GitHub Actions.
# Use `./deploy-staging.sh` from a machine on the Tailscale network instead.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 100.111.252.53
          username: smorello.adm@gc.cuny.edu
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            echo '${{ secrets.DEPLOY_PASSWORD }}' | sudo -S /data/slide-maker/deploy.sh
