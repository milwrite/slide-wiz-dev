name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 100.111.252.53
          username: smorello.adm@gc.cuny.edu
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            echo '${{ secrets.DEPLOY_PASSWORD }}' | sudo -S /data/slide-maker/deploy.sh
